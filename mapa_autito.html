<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:100vw; height:100vh; overflow:hidden;
    background:#f5f0e8; touch-action:none;
  }
  #map-container {
    position:relative; width:100%; height:100%;
  }
  #map-img {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    object-fit:contain; object-position:center;
    pointer-events:none; user-select:none;
    -webkit-user-drag:none;
  }

    position:absolute;
    width:44px; height:44px;
    cursor:grab; touch-action:none;
    filter:drop-shadow(0 3px 8px rgba(0,0,0,0.5));
    transition:filter 0.15s, transform 0.1s;
    z-index:10;
    transform:translate(-50%,-50%);
  }
  #car:hover {
    filter:drop-shadow(0 4px 14px rgba(220,40,40,0.9));
    transform:translate(-50%,-50%) scale(1.12);
  }
  #car.dragging {
    cursor:grabbing;
    filter:drop-shadow(0 6px 18px rgba(220,40,40,1));
    transform:translate(-50%,-50%) scale(1.18);
    transition:none;
  }
  /* Feedback visual cuando no puede moverse */
  #car.blocked {
    filter:drop-shadow(0 0 8px rgba(255,200,0,0.9));
    transition: filter 0.1s;
  }
</style>

<script>
const car = document.getElementById('car');
const container = document.getElementById('map-container');
const mapImg = document.getElementById('map-img');
const canvas = document.getElementById('pixel-canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

// ── Posición guardada o centro ──────────────────────────────
const saved = JSON.parse(localStorage.getItem('car_pos_g2') || 'null');
let posX = saved ? saved.x : 50;
let posY = saved ? saved.y : 50;

// ── Dibuja la imagen en el canvas una vez cargada ──────────
let imgReady = false;

function setupCanvas() {
  const iw = mapImg.naturalWidth;
  const ih = mapImg.naturalHeight;
  canvas.width  = iw;
  canvas.height = ih;
  ctx.drawImage(mapImg, 0, 0, iw, ih);
  imgReady = true;
  applyPos();
}

if (mapImg.complete) setupCanvas();
else mapImg.addEventListener('load', setupCanvas);

// ── Detectar si un punto (px,py en %) es calle ─────────────
// Las calles son grises: R≈G≈B y valor ~180-220 (gris claro/medio)
// Las manzanas son beige: R alto, G medio, B bajo
function isStreet(pctX, pctY) {
  if (!imgReady) return true; // si no está lista, permitir

  // Convertir % de pantalla a coordenadas de imagen
  // La imagen usa object-fit:contain, hay que calcular el área real
  const contRect = container.getBoundingClientRect();
  const contW = contRect.width;
  const contH = contRect.height;
  const iw = canvas.width;
  const ih = canvas.height;

  const scale = Math.min(contW / iw, contH / ih);
  const dispW = iw * scale;
  const dispH = ih * scale;
  const offX  = (contW - dispW) / 2;
  const offY  = (contH - dispH) / 2;

  // Posición en píxeles de pantalla
  const screenX = pctX / 100 * contW;
  const screenY = pctY / 100 * contH;

  // Posición relativa al área de imagen
  const imgX = Math.round((screenX - offX) / scale);
  const imgY = Math.round((screenY - offY) / scale);

  // Fuera del área de imagen → no permitir
  if (imgX < 0 || imgY < 0 || imgX >= iw || imgY >= ih) return false;

  // Muestrear zona de 5x5 alrededor del punto para mayor tolerancia
  const radius = 10;
  let streetPixels = 0, total = 0;
  for (let dy = -radius; dy <= radius; dy += 3) {
    for (let dx = -radius; dx <= radius; dx += 3) {
      const px = imgX + dx, py = imgY + dy;
      if (px < 0 || py < 0 || px >= iw || py >= ih) continue;
      const d = ctx.getImageData(px, py, 1, 1).data;
      const r = d[0], g = d[1], b = d[2];
      // Calle: píxel gris (los tres canales similares, valor entre 160-230)
      // La imagen tiene calles grises claras ~(195,200,210) y manzanas beige ~(240,235,215)
      const isGrey = Math.abs(r-g) < 20 && Math.abs(g-b) < 20 && Math.abs(r-b) < 20;
      const inRange = r > 140 && r < 235;
      // Beige/crema: R>G>B con diferencia notable
      const isBeige = r > 220 && g > 210 && b > 190 && (r - b) > 15;
      if (isGrey && inRange && !isBeige) streetPixels++;
      total++;
    }
  }
  // Si más del 30% de los píxeles muestreados son calle → es calle
  return (streetPixels / total) >= 0.30;
}

// ── Renderizar posición ─────────────────────────────────────
function applyPos() {
  car.style.left = posX + '%';
  car.style.top  = posY + '%';
}
applyPos();

// ── Drag ───────────────────────────────────────────────────
let dragging = false;
let startX, startY, startLeft, startTop;
let blockTimer = null;

function getXY(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onDown(e) {
  e.preventDefault();
  dragging = true;
  car.classList.add('dragging');
  const p = getXY(e);
  startX = p.x; startY = p.y;
  startLeft = posX; startTop = posY;
}

function onMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const p = getXY(e);
  const rect = container.getBoundingClientRect();

  const newX = Math.min(100, Math.max(0, startLeft + ((p.x - startX) / rect.width)  * 100));
  const newY = Math.min(100, Math.max(0, startTop  + ((p.y - startY) / rect.height) * 100));

  if (isStreet(newX, newY)) {
    // Movimiento permitido
    posX = newX;
    posY = newY;
    car.classList.remove('blocked');
    applyPos();
  } else {
    // Bloqueado: intentar deslizar solo en X o solo en Y
    const tryX = isStreet(newX, posY);
    const tryY = isStreet(posX, newY);
    if (tryX) {
      posX = newX;
      car.classList.remove('blocked');
    } else if (tryY) {
      posY = newY;
      car.classList.remove('blocked');
    } else {
      // Totalmente bloqueado — feedback visual
      if (!car.classList.contains('blocked')) {
        car.classList.add('blocked');
        clearTimeout(blockTimer);
        blockTimer = setTimeout(() => car.classList.remove('blocked'), 300);
      }
    }
    applyPos();
  }
}

function onUp() {
  if (!dragging) return;
  dragging = false;
  car.classList.remove('dragging');
  car.classList.remove('blocked');
  localStorage.setItem('car_pos_g2', JSON.stringify({ x: posX, y: posY }));
}

car.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
car.addEventListener('touchstart', onDown, { passive: false });
window.addEventListener('touchmove', onMove, { passive: false });
window.addEventListener('touchend', onUp);
</script>
