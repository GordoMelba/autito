<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #111;
    touch-action: none;
  }
  #map-container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #map-img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  #car {
    position: absolute;
    width: 44px;
    height: 44px;
    cursor: grab;
    touch-action: none;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.7));
    transition: filter 0.15s, transform 0.1s;
    z-index: 10;
    transform: translate(-50%, -50%);
  }
  #car:hover {
    filter: drop-shadow(0 4px 14px rgba(220,40,40,0.9));
    transform: translate(-50%, -50%) scale(1.12);
  }
  #car.dragging {
    cursor: grabbing;
    filter: drop-shadow(0 6px 18px rgba(220,40,40,1));
    transform: translate(-50%, -50%) scale(1.18);
    transition: none;
  }
  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.72);
    color: #fff;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 20px;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1s;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.1);
    white-space: nowrap;
    z-index: 20;
  }
  #hint.hidden { opacity: 0; }
</style>

  const saved = JSON.parse(localStorage.getItem('car_pos') || 'null');
  let posX = saved ? saved.x : 50;
  let posY = saved ? saved.y : 50;

  function applyPos() {
    car.style.left = posX + '%';
    car.style.top  = posY + '%';
  }
  applyPos();

  setTimeout(() => hint.classList.add('hidden'), 3000);

  let dragging = false;
  let startX, startY, startLeft, startTop;

  function getXY(e) {
    if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    e.preventDefault();
    dragging = true;
    car.classList.add('dragging');
    const p = getXY(e);
    startX = p.x;
    startY = p.y;
    startLeft = posX;
    startTop  = posY;
    hint.classList.add('hidden');
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = getXY(e);
    const rect = container.getBoundingClientRect();
    const dx = ((p.x - startX) / rect.width)  * 100;
    const dy = ((p.y - startY) / rect.height) * 100;
    posX = Math.min(100, Math.max(0, startLeft + dx));
    posY = Math.min(100, Math.max(0, startTop  + dy));
    applyPos();
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    car.classList.remove('dragging');
    localStorage.setItem('car_pos', JSON.stringify({ x: posX, y: posY }));
  }

  car.addEventListener('mousedown',  onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onUp);
  car.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove',  onMove, { passive: false });
  window.addEventListener('touchend',   onUp);
</script>
</body>
</html>
