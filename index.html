<script>
  const car = document.getElementById('car');
  const container = document.getElementById('map-container');

  const saved = JSON.parse(localStorage.getItem('car_pos_g2') || 'null');
  let posX = saved ? saved.x : 50;
  let posY = saved ? saved.y : 50;

  function applyPos() {
    car.style.left = posX + '%';
    car.style.top  = posY + '%';
  }
  applyPos();

  let dragging = false;
  let startX, startY, startLeft, startTop;

  function getXY(e) {
    if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    e.preventDefault();
    dragging = true;
    car.classList.add('dragging');
    const p = getXY(e);
    startX = p.x; startY = p.y;
    startLeft = posX; startTop = posY;
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = getXY(e);
    const rect = container.getBoundingClientRect();
    posX = Math.min(100, Math.max(0, startLeft + ((p.x - startX) / rect.width)  * 100));
    posY = Math.min(100, Math.max(0, startTop  + ((p.y - startY) / rect.height) * 100));
    applyPos();
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    car.classList.remove('dragging');
    localStorage.setItem('car_pos_g2', JSON.stringify({ x: posX, y: posY }));
  }

  car.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  car.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);
</script>
